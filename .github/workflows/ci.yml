name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API (Go)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: foundryhq
          POSTGRES_PASSWORD: foundryhq
          POSTGRES_DB: foundryhq
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U foundryhq"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/api
    env:
      DB_HOST: localhost
      DB_PORT: 5434
      DB_USER: foundryhq
      DB_PASSWORD: foundryhq
      DB_NAME: foundryhq
      DB_SSLMODE: disable
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: apps/api/go.mod

      - name: Install golang-migrate
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run migrations
        run: |
          DATABASE_URL="postgres://$DB_USER:$DB_PASSWORD@$DB_HOST:$DB_PORT/$DB_NAME?sslmode=$DB_SSLMODE"
          migrate -path internal/repositories/postgres/migrations -database "$DATABASE_URL" up

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: apps/api

      - name: Test
        run: go test -cover ./...

  web:
    name: Web (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @foundryhq/web lint

      - name: Build
        run: pnpm --filter @foundryhq/web build
